<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#151B24"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <pattern id="diag" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="rgba(209,185,125,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#diag)"/>
  <!-- Gold accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="#D1B97D"/>
  <!-- Radial glow -->
  <radialGradient id="glow" cx="55%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#D1B97D" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#D1B97D" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo group centred -->
  <g transform="translate(340, 215)">
    <!-- G/house mark -->
    <g transform="translate(0, 0)">
      <polyline points="100,14 30,74 30,166 170,166 170,102 112,102" fill="none" stroke="#D1B97D" stroke-width="17" stroke-linejoin="miter" stroke-linecap="square"/>
      <line x1="100" y1="14" x2="170" y2="74" stroke="#D1B97D" stroke-width="17" stroke-linecap="square"/>
    </g>
    <!-- Wordmark -->
    <text x="200" y="100" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="86" letter-spacing="4" fill="#FFFFFF">GILDON</text>
    <text x="202" y="158" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="46" letter-spacing="18" fill="rgba(255,255,255,0.65)">CONSTRUCTIONS</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="26" letter-spacing="1" fill="rgba(255,255,255,0.38)">Residential Builder · Geelong · Surf Coast · Bellarine Peninsula</text>
</svg>
